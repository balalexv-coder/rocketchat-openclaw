services:
  mongo:
    image: mongo:8.0
    restart: unless-stopped
    command: mongod --oplogSize 128 --replSet rs0
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - chat-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongo-init:
    image: mongo:8.0
    restart: "no"
    depends_on:
      mongo:
        condition: service_healthy
    command: >
      mongosh --host mongo --quiet --eval
      "try { rs.status().ok } catch(e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] }) }"
    networks:
      - chat-net

  rocketchat:
    image: rocket.chat:latest
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ROOT_URL: ${ROOT_URL:-https://chat.balalexv.tech}
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017/rocketchat?replicaSet=rs0}
      MONGO_OPLOG_URL: ${MONGO_OPLOG_URL:-mongodb://mongo:27017/local?replicaSet=rs0}
      PORT: "3100"
      DEPLOY_PLATFORM: docker
      OVERWRITE_SETTING_Show_Setup_Wizard: completed
    ports:
      - "3100:3100"
    volumes:
      - rocketchat-uploads:/app/uploads
    networks:
      - chat-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    restart: unless-stopped
    depends_on:
      rocketchat:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_PORT: "18790"
    ports:
      - "18790:18790"
    volumes:
      - ./openclaw-config:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    networks:
      - chat-net

networks:
  chat-net:
    driver: bridge

volumes:
  mongo-data:
  mongo-config:
  rocketchat-uploads:
  openclaw-workspace:
